        const systemCpu = document.getElementById('systemCpu').value.trim();
        const systemGpu = document.getElementById('systemGpu').value.trim();
        const concurrencyRaw = document.getElementById('concurrencyLevels').value;
        const concurrencyLevels = concurrencyRaw.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        const samplesMultiplier = parseInt(document.getElementById('samplesMultiplier').value);
        const maxTokens = parseInt(document.getElementById('maxTokens').value);

        if (!apiKey || !baseUrl || !model || concurrencyLevels.length === 0) {
            alert('API Key, Base URL, Model and at least one concurrency level required.');
            return;
        }
        if (DATASET.length === 0) {
            alert("Dataset is empty! Please populate the DATASET array with prompts from speedbench_qual_test.json");
            return;
        }

        const startBtn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const resultsCard = document.getElementById('resultsCard');
        const tableContainer = document.getElementById('tableContainer');
        const copyBtnContainer = document.getElementById('copyBtnContainer');

        startBtn.disabled = true;
        statusEl.classList.remove('error');
        statusEl.innerHTML = 'Benchmark initializing...';
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        tableContainer.innerHTML = '';
        resultsCard.style.display = 'none';
        copyBtnContainer.style.display = 'none';
        lastBenchmarkMeta = null;
        lastBenchmarkData = null;

        const categories = ["coding", "humanities", "math", "multilingual", "qa",
                            "rag", "reasoning", "roleplay", "stem", "summarization", "writing"];

        let totalSteps = 0;
        for (const concurrency of concurrencyLevels) {
            const samplesPerCategory = concurrency * samplesMultiplier;
            for (const cat of categories) {
                if (getPromptsByCategory(cat, samplesPerCategory).length > 0) totalSteps++;
            }
        }
        let completedSteps = 0;
        let benchmarkRunData = [];

        // Quick connectivity test before heavy work (optional but user-friendly)
        try {
            const testUrl = `${baseUrl}/models`;
            const testFetch = await fetch(testUrl, { method: 'GET', headers: { 'Authorization': `Bearer ${apiKey}` } });
            if (!testFetch.ok) throw new Error(`Server returned ${testFetch.status}`);
        } catch (connErr) {
            startBtn.disabled = false;
            progressBar.style.display = 'none';
            let errorMsg = `Cannot reach server at ${baseUrl}. ${connErr.message}`;
            if (connErr.message.includes('Failed to fetch') || connErr.message.includes('CORS')) {
                displayConnectionError(connErr.message, baseUrl);
            } else {
                statusEl.classList.add('error');
                statusEl.innerHTML = `${errorMsg}<br>Make sure the server is running and CORS is enabled (see instructions above).`;
            }
            return;
        }

        for (const concurrency of concurrencyLevels) {
            const samplesPerCategory = concurrency * samplesMultiplier;
            const categoriesResults = [];
            let overallPromptSum = 0, overallGenSum = 0, overallLatSum = 0, overallSamplesCount = 0;

            let tableHtml = `<h3 style="margin: 1rem 0 0.5rem 0;">Concurrency = ${concurrency}</h3>
                             <table class="results-table">
                             <thead><tr><th>Category</th><th>Samples</th><th>Avg Prompt t/s</th><th>Agg Prompt t/s</th><th>Avg Gen t/s</th><th>Agg Gen t/s</th><th>Avg Latency (s)</th></tr></thead>
                             <tbody id="tbody-${concurrency}"></tbody></table>`;
            tableContainer.insertAdjacentHTML('beforeend', tableHtml);
            resultsCard.style.display = 'block';
            const tbody = document.getElementById(`tbody-${concurrency}`);

            for (const cat of categories) {
                const prompts = getPromptsByCategory(cat, samplesPerCategory);
                if (prompts.length === 0) {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${cat}</td><td>0</td><td colspan="5">N/A</td>`;
                    tbody.appendChild(row);
                    completedSteps++;
                    updateProgress(completedSteps, totalSteps, progressFill);
                    continue;
                }

                statusEl.innerHTML = `Running <strong>${cat}</strong> @ concurrency=${concurrency} (${prompts.length} samples) ...`;
                let results;
                try {
                    results = await asyncPool(concurrency, prompts, (prompt) =>
                        performRequest(apiKey, baseUrl, model, prompt, maxTokens)
                    );
                } catch (err) {
                    // Check if it's a global CORS error
                    if (err.message.includes('CORS') || err.message.includes('network') || err.message.includes('Failed to fetch')) {
                        displayConnectionError(err.message, baseUrl);
                        startBtn.disabled = false;
                        progressBar.style.display = 'none';
                        statusEl.classList.add('error');
                        return;
                    }
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${cat}</td><td>${prompts.length}</td><td colspan="5" style="color:var(--danger);">Error: ${err.message.slice(0, 80)}</td>`;
                    tbody.appendChild(row);
                    completedSteps++;
                    updateProgress(completedSteps, totalSteps, progressFill);
                    continue;
                }

                const valid = results.filter(r => (r.promptTps > 0 || r.genTps > 0));
                const avgPromptTps = valid.length ? valid.reduce((s, r) => s + r.promptTps, 0) / valid.length : 0;
                const avgGenTps = valid.length ? valid.reduce((s, r) => s + r.genTps, 0) / valid.length : 0;
                const avgLatency = valid.length ? valid.reduce((s, r) => s + r.totalTime, 0) / valid.length : 0;
                const aggPromptTps = concurrency * avgPromptTps;
                const aggGenTps = concurrency * avgGenTps;

                categoriesResults.push({
                    name: cat, samplesCount: prompts.length,
                    avgPromptTps, aggPromptTps, avgGenTps, aggGenTps, avgLatency
                });

                overallPromptSum += avgPromptTps;
                overallGenSum += avgGenTps;
                overallLatSum += avgLatency;
                overallSamplesCount += prompts.length;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${cat}</td><td>${prompts.length}</td>
                    <td>${avgPromptTps.toFixed(2)}</td><td>${aggPromptTps.toFixed(2)}</td>
                    <td>${avgGenTps.toFixed(2)}</td><td>${aggGenTps.toFixed(2)}</td>
                    <td>${avgLatency.toFixed(3)}</td>
                `;
                tbody.appendChild(row);
                completedSteps++;
                updateProgress(completedSteps, totalSteps, progressFill);
            }

            const catCount = categoriesResults.length;
            const totalAvgPtps = overallPromptSum / catCount;
            const totalAvgGtps = overallGenSum / catCount;
            const totalAvgLat = overallLatSum / catCount;
            const overallAggPrompt = concurrency * totalAvgPtps;
            const overallAggGen = concurrency * totalAvgGtps;

            const overallRow = document.createElement('tr');
            overallRow.classList.add('overall-row');
            overallRow.innerHTML = `
                <td><strong>OVERALL</strong></td><td>${overallSamplesCount}</td>
                <td><strong>${totalAvgPtps.toFixed(2)}</strong></td><td><strong>${overallAggPrompt.toFixed(2)}</strong></td>
                <td><strong>${totalAvgGtps.toFixed(2)}</strong></td><td><strong>${overallAggGen.toFixed(2)}</strong></td>
                <td><strong>${totalAvgLat.toFixed(3)}</strong></td>
            `;
            tbody.appendChild(overallRow);

            benchmarkRunData.push({
                concurrency,
                categoriesResults,
                overall: {
                    samplesCount: overallSamplesCount,
                    avgPromptTps: totalAvgPtps,
                    aggPromptTps: overallAggPrompt,
                    avgGenTps: totalAvgGtps,
                    aggGenTps: overallAggGen,
                    avgLatency: totalAvgLat
                }
            });
        }

        const now = new Date();
        const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        lastBenchmarkMeta = {
            timestamp, model, baseUrl, inferenceEngine, systemCpu, systemGpu,
            concurrencyLevels, samplesMultiplier, maxTokens
        };
        lastBenchmarkData = benchmarkRunData;

        statusEl.innerHTML = 'Benchmark complete!';
        statusEl.classList.remove('error');
        startBtn.disabled = false;
        progressBar.style.display = 'none';
        copyBtnContainer.style.display = 'flex';
        document.getElementById('copyResultsBtn').onclick = copyResultsToClipboard;
    }

    // Theme toggling
    function setTheme(theme) {
        const body = document.body;
        if (theme === 'light') body.classList.add('light');
        else body.classList.remove('light');
        localStorage.setItem('vscode_bench_theme', theme);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            if (btn.getAttribute('data-theme') === theme) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function initTheme() {
        const saved = localStorage.getItem('vscode_bench_theme') || 'dark';
        setTheme(saved);
        document.getElementById('darkModeBtn')?.addEventListener('click', () => setTheme('dark'));
        document.getElementById('lightModeBtn')?.addEventListener('click', () => setTheme('light'));
    }

    document.getElementById('startBtn').addEventListener('click', startBenchmark);
    initTheme();

    if (DATASET.length === 0) {
        const statusDiv = document.getElementById('status');
        statusDiv.classList.add('error');
        statusDiv.innerHTML = 'DATASET is empty! Please paste your speedbench_qual_test.json array into the DATASET variable (categories + prompts).';
    } else {
        console.log(`Dataset ready: ${DATASET.length} prompts.`);
    }
</script>
</body>
</html>
